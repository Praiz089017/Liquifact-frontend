name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: "npm"

      # Lockfile-drift guard: regenerate the lockfile in-place and fail if it
      # differs from the committed one. This catches PRs where someone ran
      # `npm install` without committing the updated package-lock.json.
      - name: Check lockfile is in sync
        run: |
          npm install --package-lock-only --ignore-scripts
          git diff --exit-code package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Format Check
        run: npm run format:check

      - name: Build
        run: npm run build

      - name: Test Accessibility
        run: npm test --silent

  security-audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "20"
      
      # Audit dependencies for high or critical vulnerabilities.
      # As the app handles financial flows and wallet integration,
      # keeping dependencies secure is critical.
      # To waive a false-positive, use 'npm audit fix' or update the package manually.
      - name: Dependency Audit
        run: npm audit --audit-level=high

  secret-scan:
    runs-on: ubuntu-latest
    steps:
      # fetch-depth: 0 is required for gitleaks to scan the full history/diff.
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
          
      # Run Gitleaks to detect hardcoded secrets (API keys, tokens, etc.) in the repository.
      - name: Secret Scan
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
